<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonse Hub Connect - Consultation</title>
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            overflow: hidden;
        }

        #jitsi-container {
            width: 100%;
            height: 100vh;
            display: none;
        }

        #jitsi-container.active {
            display: block;
        }

        #loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            flex-direction: column;
            gap: 24px;
        }

        #loading.hidden {
            display: none;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: white;
            font-size: 18px;
            text-align: center;
        }

        .error-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .error-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
        }

        .error-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .error-box h2 {
            color: #d32f2f;
            margin-bottom: 12px;
            font-size: 24px;
        }

        .error-box p {
            color: #666;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 8px;
        }

        .error-box .error-details {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 14px;
            color: #999;
        }

        .success-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .error-box h3 {
            color: #4caf50;
            margin-bottom: 12px;
            font-size: 22px;
        }

        /* Debug info (remove in production) */
        #debug {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: #0f0;
            padding: 10px;
            font-size: 12px;
            font-family: monospace;
            border-radius: 4px;
            max-width: 300px;
            max-height: 150px;
            overflow-y: auto;
            z-index: 9999;
            display: none;
        }

        @media (max-width: 768px) {
            .error-box {
                padding: 24px;
            }

            .error-box h2 {
                font-size: 20px;
            }

            .error-box p {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div id="jitsi-container"></div>
    <div id="loading">
        <div class="spinner"></div>
        <div class="loading-text">Loading consultation...</div>
    </div>
    <div id="debug"></div>

    <script>
        // Configuration
        const DEBUG = false; // Set to true to see console logs in UI

        // Utility functions
        function log(message) {
            console.log(message);
            if (DEBUG) {
                const debugDiv = document.getElementById('debug');
                debugDiv.style.display = 'block';
                debugDiv.innerHTML += message + '<br>';
                debugDiv.scrollTop = debugDiv.scrollHeight;
            }
        }

        function showError(title, message, details = '') {
            const container = document.getElementById('jitsi-container');
            container.classList.remove('active');
            document.getElementById('loading').classList.add('hidden');

            const errorHTML = `
                <div class="error-container">
                    <div class="error-box">
                        <div class="error-icon">❌</div>
                        <h2>${title}</h2>
                        <p>${message}</p>
                        ${details ? `<div class="error-details">${details}</div>` : ''}
                    </div>
                </div>
            `;
            container.innerHTML = errorHTML;
            container.classList.add('active');
        }

        function showSuccess(title, message) {
            const container = document.getElementById('jitsi-container');
            container.classList.remove('active');
            document.getElementById('loading').classList.add('hidden');

            const successHTML = `
                <div class="error-container">
                    <div class="error-box">
                        <div class="success-icon">✅</div>
                        <h3>${title}</h3>
                        <p>${message}</p>
                    </div>
                </div>
            `;
            container.innerHTML = successHTML;
            container.classList.add('active');
        }

        // Get URL parameters
        function getUrlParam(param) {
            const url = new URL(window.location);
            return url.searchParams.get(param);
        }

        // Main initialization
        function initialize() {
            const room = getUrlParam('room');
            const token = getUrlParam('token');
            const name = getUrlParam('name') || 'Guest';

            log(`Initializing with room: ${room}`);
            log(`Token present: ${token ? 'Yes' : 'No'}`);
            log(`Name: ${name}`);

            // Validate parameters
            if (!room || !token) {
                log('ERROR: Missing room or token');
                showError(
                    'Invalid Consultation Link',
                    'This consultation link is missing required parameters.',
                    'Please ensure you have both the room and token in the URL.'
                );
                return;
            }

            // Wait for Jitsi API
            const checkJitsiAPI = setInterval(() => {
                if (typeof JitsiMeetExternalAPI !== 'undefined') {
                    clearInterval(checkJitsiAPI);
                    log('Jitsi API loaded successfully');
                    initializeJitsi(room, token, name);
                }
            }, 100);

            // Timeout if Jitsi doesn't load
            setTimeout(() => {
                if (typeof JitsiMeetExternalAPI === 'undefined') {
                    clearInterval(checkJitsiAPI);
                    log('ERROR: Jitsi API failed to load');
                    showError(
                        'Failed to Load Video Service',
                        'Could not load Jitsi Meet. Please check your internet connection and try again.'
                    );
                }
            }, 5000);
        }

        // Initialize Jitsi
        function initializeJitsi(room, token, name) {
            try {
                log('Starting Jitsi initialization');
                document.getElementById('loading').classList.add('hidden');

                const options = {
                    roomName: room,
                    jwt: token,
                    parentNode: document.querySelector('#jitsi-container'),
                    configOverwrite: {
                        startWithAudioMuted: false,
                        startWithVideoMuted: false,
                        disableAudioLevels: false,
                        enableLayerSuspension: true,
                    },
                    interfaceConfigOverwrite: {
                        // Hide Jitsi branding
                        SHOW_JITSI_WATERMARK: false,
                        SHOW_BRAND_WATERMARK: false,
                        DISPLAY_WELCOME_PAGE: false,

                        // UI customization
                        TOOLBAR_TIMEOUT: 4000,
                        DEFAULT_BACKGROUND: '#000',
                        SHOW_CHROME_EXTENSION_BANNER: false,

                        // Buttons to show in toolbar
                        TOOLBAR_BUTTONS: [
                            'microphone',
                            'camera',
                            'desktop',
                            'fullscreen',
                            'hangup',
                            'settings',
                            'stats',
                        ],
                    },
                    userInfo: {
                        displayName: decodeURIComponent(name),
                    },
                };

                log('Jitsi options configured');

                // Create Jitsi instance
                const api = new JitsiMeetExternalAPI('meet.jit.si', options);
                log('Jitsi instance created');

                document.getElementById('jitsi-container').classList.add('active');

                // Event handlers
                api.addEventListener('readyToClose', () => {
                    log('Call ended - readyToClose event');
                    showSuccess(
                        'Consultation Ended',
                        'Thank you for using Bonse Hub Connect. You can close this window now.'
                    );
                });

                api.addEventListener('videoConferenceJoined', (event) => {
                    log(`Video conference joined: ${event.roomName}`);
                });

                api.addEventListener('participantJoined', (event) => {
                    log(`Participant joined: ${event.detail.id}`);
                });

                api.addEventListener('participantLeft', (event) => {
                    log(`Participant left: ${event.detail.id}`);
                });

                api.addEventListener('videoMuted', () => {
                    log('Video muted');
                });

                api.addEventListener('videoUnmuted', () => {
                    log('Video unmuted');
                });

                api.addEventListener('audioMuted', () => {
                    log('Audio muted');
                });

                api.addEventListener('audioUnmuted', () => {
                    log('Audio unmuted');
                });

                api.addEventListener('audioAvailabilityChanged', (event) => {
                    log(`Audio availability changed: ${event.detail.available}`);
                });

                api.addEventListener('videoAvailabilityChanged', (event) => {
                    log(`Video availability changed: ${event.detail.available}`);
                });

                api.addEventListener('screenSharingStatusChanged', (event) => {
                    log(`Screen sharing: ${event.detail.on ? 'Started' : 'Stopped'}`);
                });

                log('Jitsi successfully initialized');

            } catch (error) {
                log(`ERROR during Jitsi init: ${error.message}`);
                console.error('Error initializing Jitsi:', error);
                showError(
                    'Error Loading Video Consultation',
                    'An error occurred while loading the video service.',
                    `Error: ${error.message}`
                );
            }
        }

        // Start initialization when page loads
        window.addEventListener('DOMContentLoaded', initialize);

        // Fallback initialization if DOMContentLoaded already fired
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initialize);
        } else {
            initialize();
        }

        // Handle page visibility (pause on tab switch - optional)
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                log('Page hidden');
            } else {
                log('Page visible');
            }
        });

        // Handle beforeunload
        window.addEventListener('beforeunload', (event) => {
            log('User leaving page');
        });
    </script>
</body>
</html>
